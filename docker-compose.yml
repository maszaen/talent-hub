version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: university-talent-hub-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: talent_hub
    ports:
      - "13306:3306"
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped

volumes:
  db_data:
